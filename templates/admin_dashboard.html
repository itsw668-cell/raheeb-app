<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الطلبات — رهيب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#C0191F;--yellow:#F5C518;--black:#06060F;--card:#101018;--border:rgba(255,255,255,.07)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--black);color:#eee;min-height:100vh}

/* TOPBAR */
.topbar{background:rgba(10,10,20,.95);border-bottom:2px solid var(--red);padding:0 32px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.topbar-brand{font-family:'Oswald',sans-serif;font-size:1.4rem;color:var(--yellow);letter-spacing:2px;display:flex;align-items:center;gap:10px}
.live-dot{width:9px;height:9px;background:#4CAF50;border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.logout-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#aaa;padding:8px 16px;border-radius:7px;font-family:'Cairo',sans-serif;font-size:.85rem;cursor:pointer;text-decoration:none;transition:all .2s}
.logout-btn:hover{background:rgba(192,25,31,.15);border-color:var(--red);color:#fff}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:24px 32px}
.stat-card{background:var(--card);border-radius:12px;padding:18px 20px;border:1px solid var(--border);text-align:center}
.stat-card .num{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;display:block}
.stat-card .lbl{font-size:.78rem;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.stat-card.new .num{color:#FF6B35}
.stat-card.prep .num{color:var(--yellow)}
.stat-card.done .num{color:#4CAF50}
.stat-card.total .num{color:#64B5F6}

/* FILTERS */
.filters{padding:0 32px 20px;display:flex;gap:10px;flex-wrap:wrap}
.filter-btn{padding:8px 18px;border-radius:20px;font-size:.85rem;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;transition:all .25s;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#778}
.filter-btn.active{background:var(--red);color:#fff;border-color:var(--red)}
.refresh-info{margin-right:auto;font-size:.78rem;color:#444;display:flex;align-items:center;gap:6px}

/* ORDERS */
.orders-wrap{padding:0 32px 40px}
.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}
.no-orders{text-align:center;padding:80px 20px;color:#333}
.no-orders .icon{font-size:3rem;margin-bottom:12px}

/* ORDER CARD */
.order-card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;transition:all .3s;animation:slideIn .35s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.order-card.new{border-top:3px solid #FF6B35}
.order-card.preparing{border-top:3px solid var(--yellow)}
.order-card.delivered{border-top:3px solid #4CAF50;opacity:.7}

.order-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.order-id{font-family:'Oswald',sans-serif;font-size:1.1rem;color:#fff}
.order-time{font-size:.75rem;color:#445}
.status-badge{padding:4px 12px;border-radius:12px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.status-badge.new{background:rgba(255,107,53,.15);color:#FF6B35;border:1px solid rgba(255,107,53,.3)}
.status-badge.preparing{background:rgba(245,197,24,.12);color:var(--yellow);border:1px solid rgba(245,197,24,.3)}
.status-badge.delivered{background:rgba(76,175,80,.12);color:#4CAF50;border:1px solid rgba(76,175,80,.3)}

.order-body{padding:16px 18px}
.customer-info{margin-bottom:14px}
.info-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:.88rem}
.info-row .ico{width:26px;height:26px;background:rgba(255,255,255,.05);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.info-row span{color:#ccc}
.info-row a{color:var(--yellow);text-decoration:none}
.info-row a:hover{text-decoration:underline}

.items-list{background:rgba(255,255,255,.03);border-radius:8px;padding:10px 12px;margin-bottom:14px;border:1px solid var(--border)}
.items-list .item-row{display:flex;justify-content:space-between;font-size:.84rem;padding:4px 0;color:#aaa}
.items-list .item-row span:first-child{color:#ccc}
.order-total{display:flex;justify-content:space-between;font-family:'Oswald',sans-serif;font-size:1.1rem;padding-top:10px;border-top:1px solid var(--border)}
.order-total span:last-child{color:var(--yellow)}

.order-actions{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px}
.action-btn{flex:1;padding:9px;border-radius:7px;font-size:.82rem;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;transition:all .25s;border:none}
.action-btn.prep{background:rgba(245,197,24,.12);color:var(--yellow);border:1px solid rgba(245,197,24,.25)}
.action-btn.prep:hover{background:rgba(245,197,24,.25)}
.action-btn.done{background:rgba(76,175,80,.12);color:#4CAF50;border:1px solid rgba(76,175,80,.25)}
.action-btn.done:hover{background:rgba(76,175,80,.25)}
.action-btn.undo{background:rgba(255,255,255,.05);color:#666;border:1px solid rgba(255,255,255,.08)}
.action-btn.undo:hover{background:rgba(255,255,255,.1);color:#aaa}

/* NOTIFICATION */
.notif{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-80px);background:#111;border:1px solid var(--border);border-right:3px solid #4CAF50;color:#fff;padding:12px 20px;border-radius:10px;font-size:.9rem;font-weight:600;z-index:200;transition:all .4s;white-space:nowrap}
.notif.show{transform:translateX(-50%) translateY(0)}

@media(max-width:700px){
  .stats-bar{grid-template-columns:repeat(2,1fr);padding:16px}
  .orders-wrap,.filters,.topbar{padding-right:16px;padding-left:16px}
  .orders-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="live-dot"></div>
    🍔 لوحة الطلبات
  </div>
  <a href="/admin/logout" class="logout-btn">خروج 🚪</a>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-card new"><span class="num" id="st-new">0</span><div class="lbl">🟠 جديد</div></div>
  <div class="stat-card prep"><span class="num" id="st-prep">0</span><div class="lbl">🟡 جاري التحضير</div></div>
  <div class="stat-card done"><span class="num" id="st-done">0</span><div class="lbl">🟢 تم التوصيل</div></div>
  <div class="stat-card total"><span class="num" id="st-total">0</span><div class="lbl">📦 إجمالي اليوم</div></div>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">الكل</button>
  <button class="filter-btn" onclick="setFilter('new',this)">🟠 جديد</button>
  <button class="filter-btn" onclick="setFilter('preparing',this)">🟡 جاري التحضير</button>
  <button class="filter-btn" onclick="setFilter('delivered',this)">🟢 تم التوصيل</button>
  <div class="refresh-info"><div class="live-dot"></div> يتحدث كل 10 ثوان</div>
</div>

<!-- ORDERS -->
<div class="orders-wrap">
  <div class="orders-grid" id="orders-grid">
    <div class="no-orders"><div class="icon">📭</div><p>جاري التحميل...</p></div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
let currentFilter = 'all';
let knownIds = new Set();
let firstLoad = true;

const STATUS_LABELS = { new: 'جديد', preparing: 'جاري التحضير', delivered: 'تم التوصيل' };
const STATUS_AR = { new: '🟠 جديد', preparing: '🟡 تحضير', delivered: '🟢 توصيل' };

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadOrders();
}

async function loadOrders() {
  try {
    const res  = await fetch('/admin/api/orders?status=' + currentFilter);
    const data = await res.json();
    renderOrders(data);
    updateStats(data);

    if (!firstLoad) {
      data.forEach(o => {
        if (!knownIds.has(o.id) && o.status === 'new') {
          showNotif('🔔 طلب جديد #' + String(o.id).padStart(4,'0') + ' — ' + o.name);
        }
      });
    }
    data.forEach(o => knownIds.add(o.id));
    firstLoad = false;
  } catch(e) {
    console.error(e);
  }
}

function renderOrders(orders) {
  const grid = document.getElementById('orders-grid');
  if (!orders.length) {
    grid.innerHTML = `<div class="no-orders"><div class="icon">📭</div><p>لا توجد طلبات</p></div>`;
    return;
  }
  grid.innerHTML = orders.map(o => `
    <div class="order-card ${o.status}" id="order-${o.id}">
      <div class="order-head">
        <div>
          <div class="order-id">#${String(o.id).padStart(4,'0')}</div>
          <div class="order-time">🕐 ${o.created_at}</div>
        </div>
        <div class="status-badge ${o.status}">${STATUS_AR[o.status]}</div>
      </div>
      <div class="order-body">
        <div class="customer-info">
          <div class="info-row"><div class="ico">👤</div><span>${o.name}</span></div>
          <div class="info-row"><div class="ico">📞</div><a href="tel:${o.phone}" dir="ltr">${o.phone}</a></div>
          <div class="info-row"><div class="ico">📍</div><span>${o.wilaya} — ${o.commune}</span></div>
          <div class="info-row"><div class="ico">🏠</div><span>${o.address}</span></div>
        </div>
        <div class="items-list">
          ${o.items.map(i => `<div class="item-row"><span>${i.name} × ${i.qty}</span><span>${(i.price*i.qty).toLocaleString()} DA</span></div>`).join('')}
        </div>
        <div class="order-total"><span>الإجمالي</span><span>${o.total.toLocaleString()} DA</span></div>
      </div>
      <div class="order-actions">
        ${o.status === 'new'       ? `<button class="action-btn prep" onclick="updateStatus(${o.id},'preparing')">🟡 بدأ التحضير</button>` : ''}
        ${o.status === 'preparing' ? `<button class="action-btn done" onclick="updateStatus(${o.id},'delivered')">🟢 تم التوصيل</button>` : ''}
        ${o.status !== 'new'       ? `<button class="action-btn undo" onclick="updateStatus(${o.id},'new')">↩ إعادة</button>` : ''}
      </div>
    </div>
  `).join('');
}

function updateStats(orders) {
  const all   = orders.length;
  const nw    = orders.filter(o => o.status==='new').length;
  const pr    = orders.filter(o => o.status==='preparing').length;
  const dn    = orders.filter(o => o.status==='delivered').length;
  document.getElementById('st-new').textContent   = nw;
  document.getElementById('st-prep').textContent  = pr;
  document.getElementById('st-done').textContent  = dn;
  document.getElementById('st-total').textContent = all;
}

async function updateStatus(id, status) {
  await fetch(`/admin/api/order/${id}/status`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({status})
  });
  loadOrders();
  showNotif('✅ تم تحديث الطلب #' + String(id).padStart(4,'0'));
}

function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 3500);
}

// load immediately then every 10s
loadOrders();
setInterval(loadOrders, 10000);
</script>
</body>
</html>
